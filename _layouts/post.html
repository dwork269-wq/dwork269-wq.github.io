---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">
    {{ page.date | date: "%B %-d, %Y" }}
    {% if page.tags and page.tags.size > 0 %}
      {% for t in page.tags %}
        <span class="sep">☼</span><a href="{{ '/tags/#' | append: t | relative_url }}">{{ t }}</a>
      {% endfor %}
    {% endif %}
  </p>
  <div class="post-content">
    {{ content }}
  </div>
</article>
