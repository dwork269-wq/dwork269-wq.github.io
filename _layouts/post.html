---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%b %e, %Y" }}
    </time>
    {% if page.tags and page.tags.size > 0 %}
      • {% for t in page.tags %}
          <a class="tag" href="{{ '/tags/#' | append: t | relative_url }}">{{ t }}</a>{% unless forloop.last %}, {% endunless %}
        {% endfor %}
    {% endif %}
  </p>
  <div class="post-content">
    {{ content }}
  </div>
</article>
